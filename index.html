<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Ki</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #c7d2fe, #fbcfe8);
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 40px;
      flex-wrap: wrap; /* ini bikin 2 atas 1 bawah */
    }

    .card {
      width: 260px;
      min-height: 420px; /* ini bikin kotak panjang */
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0;
    }

    p {
      margin: 5px 0;
    }

    iframe {
      width: 100%;
      height: 150px;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* WARNA */
    .card1 {
      background-color: white;
    }

    .card2 {
      background-color: #e5e5e5;
    }

    .card3 {
      background: linear-gradient(to bottom, #f8b6c2, white);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- KOTAK 1 -->
    <div class="card card1">
      <img src="fotoku.jpg">
      <h2>Ki 💖</h2>
      <p>Ini website CV aku ✨</p>

      <p>🎯 <b>Hobi</b></p>
      <p>Nonton, musik, dll</p>
    </div>

    <!-- KOTAK 2 -->
    <div class="card card2">
      <img src="fotoku.jpg">
      <h2>Ki 💖</h2>
      <p>Ini website CV aku ✨</p>

      <p>🌟 <b>Cita-cita</b></p>
      <p>Mau jadi ...</p>
    </div>

    <!-- KOTAK 3 -->
    <div class="card card3">
      <img src="fotoku.jpg">
      <h2>Ki 💖</h2>

      <p>🎬 <b>Video favorit</b></p>

      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allowfullscreen>
      </iframe>
    </div>

  </div>

</body>
</html>
