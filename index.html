<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Ki</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #c7d2fe, #fbcfe8);
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 260px;
      min-height: 420px;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }

    iframe {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      margin-top: 15px;
    }

    h2 {
      margin: 10px 0;
    }

    .card1 {
      background-color: white;
    }

    .card2 {
      background-color: #e5e5e5;
    }

    .card3 {
      background: linear-gradient(to bottom, #f8b6c2, white);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- KOTAK 1 -->
    <div class="card card1">
      <h2>Aulia Hana Rahma Dewi 💖</h2>
      <p>🎬 Video 1</p>
      <iframe 
        src="https://www.youtube.com/embed/JLd09jmEAYA"
        allowfullscreen>
      </iframe>
    </div>

    <!-- KOTAK 2 -->
    <div class="card card2">
      <h2>Aulia Hana Rahma Dewi 💖</h2>
      <p>🎵 Video 2</p>
      <iframe 
        src="https://www.youtube.com/embed/KdsGxzO3Jy8"
        allowfullscreen>
      </iframe>
    </div>

    <!-- KOTAK 3 -->
    <div class="card card3">
      <h2>Aulia Hana Rahma Dewi 💖</h2>
      <p>🎶 Video 3</p>
      <iframe 
        src="https://www.youtube.com/embed/c6DaMaVsqIE"
        allowfullscreen>
      </iframe>
    </div>

  </div>

</body>
</html>
