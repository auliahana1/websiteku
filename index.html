<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Ki</title>
  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #dbeafe, #fbcfe8);
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 260px;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* WARNA KOTAK */
    .card1 {
      background-color: white;
    }

    .card2 {
      background-color: #e5e5e5;
    }

    .card3 {
      background: linear-gradient(to bottom, #f8b6c2, white);
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      margin: 5px 0;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- KOTAK 1 -->
    <div class="card card1">
      <img src="fotoku.jpg" alt="foto">
      <h2>Ki 💖</h2>
      <p>Ini website CV aku ✨</p>
      <p>🎯 Hobi</p>
      <p>Nonton, musik, dll</p>
    </div>

    <!-- KOTAK 2 -->
    <div class="card card2">
      <img src="fotoku.jpg" alt="foto">
      <h2>Ki 💖</h2>
      <p>Ini website CV aku ✨</p>
      <p>🌟 Cita-cita</p>
      <p>Mau jadi ...</p>
    </div>

    <!-- KOTAK 3 -->
    <div class="card card3">
      <img src="fotoku.jpg" alt="foto">
      <h2>Ki 💖</h2>
      <p>🎬 Video favorit</p>

      <iframe height="150"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

  </div>

</body>
</html>
